<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOPS Focus Blocker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #eef2ff;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --success: #22c55e;
      --success-light: #f0fdf4;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --card: #f9fafb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      width: 320px;
      min-height: 200px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      font-size: 18px;
      line-height: 1;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Focus toggle ── */
    .focus-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .focus-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .focus-label {
      font-weight: 600;
      font-size: 13px;
    }
    .focus-status {
      font-size: 11px;
      margin-top: 3px;
    }
    .focus-status.active   { color: var(--success); }
    .focus-status.inactive { color: var(--muted); }

    /* Toggle switch */
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: var(--primary); }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* ── Warning (no sites) ── */
    .warn-banner {
      display: none;
      margin: 0 16px 12px;
      padding: 8px 10px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      font-size: 11px;
      color: #92400e;
      line-height: 1.4;
    }

    /* ── Sites section ── */
    .sites-section { padding: 14px 16px; }
    .sites-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    /* Add row */
    .add-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .add-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .add-row input:focus { border-color: var(--primary); }
    .add-row input::placeholder { color: #d1d5db; }
    .btn-add {
      padding: 6px 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-add:hover { background: var(--primary-dark); }
    .btn-add:active { transform: scale(0.97); }

    /* Sites list */
    #sites-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .site-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .site-domain {
      font-size: 12px;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      padding: 0 0 0 8px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: var(--danger); }

    /* Empty state */
    .empty {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: #d1d5db;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-icon">⚡</span>
    <div>
      <div class="header-title">LifeOPS Focus Blocker</div>
      <div class="header-sub">Keep distractions out during focus sessions</div>
    </div>
  </div>

  <!-- Focus toggle -->
  <div class="focus-section">
    <div class="focus-row">
      <div>
        <div class="focus-label">Focus Mode</div>
        <div class="focus-status inactive" id="focus-status">Inactive — sites are not blocked</div>
      </div>
      <label class="switch" title="Toggle Focus Mode">
        <input type="checkbox" id="focus-toggle" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Warning: no sites added -->
  <div class="warn-banner" id="warn-banner">
    Add at least one site below for blocking to take effect.
  </div>

  <!-- Blocked sites -->
  <div class="sites-section">
    <div class="sites-label">Blocked Sites</div>
    <div class="add-row">
      <input
        type="text"
        id="site-input"
        placeholder="e.g. youtube.com"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-add" id="add-btn">Add</button>
    </div>
    <ul id="sites-list"></ul>
  </div>

  <div class="footer">Changes apply immediately when Focus Mode is active</div>

  <script src="popup.js"></script>
</body>
</html>
